baseURL = "https://example.com"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "Cactus Plus Theme Demo"
theme = "cactus-plus"

# Client-side search (fuse.js).
# Hugo requires the user to declare the JSON output format + add it to outputs.
[outputFormats.searchindex]
  baseName = "searchindex"
  mediaType = "application/json"
  isPlainText = true

[outputs]
  home = ["html", "rss", "searchindex"]

# Main menu
[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/posts"
weight = 2

[[menu.main]]
name = "Books"
url = "/books"
weight = 3

[[menu.main]]
name = "书影音"
url = "/neodb"
weight = 4

[[menu.main]]
name = "Diary"
url = "/diary"
weight = 5

[[menu.main]]
name = "Paintings"
url = "/paintings"
weight = 6

# [[menu.main]]
# name = "Tags"
# url = "/tags"
# weight = 5

[[menu.main]]
name = "About"
url = "/about"
weight = 7

# Pagination
[pagination]
  pagerSize = 3

# Markdown configuration
[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = true
    style = "dracula"

# Parameters
[params]
  colortheme = "white"  # Options: dark, white
  rss = true
  mainSection = "posts"

  # Homepage settings
  description = "A demo site for the Cactus Plus Hugo theme, showcasing its features."
  postsOnHomePage = 5

  # Post settings
  showReadTime = true
  dateFormat = "2006-01-02"
  tocInline = true

  # Comments system (optional)
  [params.comments]
    enabled = false  # Disabled by default

  # Books configuration
  [params.books]
    booksPerPage = 20  # Number of books per page
    showRating = true
    showReadingTime = true

  # Diary configuration
  [params.diary]
  diaryPerPage = 10

  # Paintings configuration
  [params.paintings]
  paintingsPerPage = 12

  # Music player configuration
  [params.music]
    enabled = true

  # Client-side search configuration (fuse.js). Requires the searchindex
  # output format declared above to generate /searchindex.json.
  [params.search]
    enabled = true

  # NeoDB configuration
  # 1. Deploy the Cloudflare Worker from neodb-worker.js
  # 2. Set NEODB_TOKEN env var in your Worker settings
  # 3. Set apiUrl to your Worker URL below
  [params.neodb]
    enabled = true
    apiUrl = "https://your-worker-name.workers.dev"

  # Social links (optional)
  [[params.social]]
    name = "github"
    link = "https://github.com/your-username"
