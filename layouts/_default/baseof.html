<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
{{ partial "head.html" . }}
<body class="max-width mx-auto px3 ltr">
  <!-- Theme switcher (fixed in top-left corner) -->
  <div class="theme-switcher">
    <!-- JavaScript will insert toggle button here -->
  </div>

  <div class="content index py4">

    {{ partial "header.html" . }}

    {{ block "main" . }}{{ end }}

    {{ partial "footer.html" . }}

  </div>

  {{ partial "music-player.html" . }}

  <script src={{ "js/spa-router.js" | relURL }} defer></script>
  <script src={{ "js/code-copy.js" | relURL }} defer></script>
  <script src={{ "js/main.js" | relURL }} defer></script>
</body>
</html>
