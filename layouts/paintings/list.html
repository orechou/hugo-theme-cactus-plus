{{ define "main" }}
{{ $paintings := .Site.Data.paintings }}
{{ $allTags := slice }}
{{ range $paintings }}
  {{ with .tags }}
    {{ $allTags = $allTags | append . }}
  {{ end }}
{{ end }}
{{ $uniqueTags := $allTags | uniq | sort }}

<script>window.paintingsData = {{ jsonify $paintings | safeJS }};</script>

<div id="paintings">
  <div class="paintings-filter">
    <button class="painting-filter-tag active" data-filter="">All</button>
    {{ range $uniqueTags }}
    <button class="painting-filter-tag" data-filter="{{ . }}">{{ . }}</button>
    {{ end }}
  </div>
  <div class="paintings-masonry">
    <div class="paintings-column"></div>
    <div class="paintings-column"></div>
    <div class="paintings-column"></div>
  </div>
  <div class="paintings-loader" hidden>
    <span class="loader-spinner"></span>
    <span class="loader-text">Loading...</span>
  </div>
</div>

<!-- Modal -->
<div class="painting-modal" id="paintingModal">
  <div class="painting-modal-overlay"></div>
  <div class="painting-modal-content">
    <button class="painting-modal-close">&times;</button>
    <div class="painting-modal-image">
      <img src="" alt="">
    </div>
    <div class="painting-modal-body">
      <h2 class="painting-modal-title"></h2>
      <div class="painting-modal-meta"></div>
      <div class="painting-description"></div>
      <div class="painting-modal-info"></div>
      <div class="painting-modal-tags"></div>
    </div>
  </div>
</div>

<script src={{ "js/paintings.js" | relURL }}></script>
{{ end }}
